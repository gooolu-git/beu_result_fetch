<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="k58-KBRH0cR6KRhV2BodPfof8MDNFSm_g3HX36ij-tc" />
    <title>BEU Result Engine | Download Bihar Engineering University Marksheets</title>
    <meta name="description"
        content="Fastest way to download and merge BEU university results. Export batch marksheets to a single PDF using registration numbers.">
    <meta name="keywords" content="BEU Results, Bihar Engineering University, Marksheet Downloader, BEU PDF Export">

    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%230f172a'%3E%3Cpath d='M12 3L1 9l11 6 9-4.91V17h2V9L12 3z'/%3E%3Cpath d='M5 13.18v4.59c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-4.59l-7 3.82-7-3.82z'/%3E%3C/svg%3E">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #0f172a;
            --accent: #3b82f6;
            --bg: #f8fafc;
            --card-bg: rgba(255, 255, 255, 0.8);
            --border: #e2e8f0;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            background-image: radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.05) 0, transparent 50%),
                radial-gradient(at 100% 100%, rgba(59, 130, 246, 0.05) 0, transparent 50%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            color: var(--primary);
            overflow-x: hidden;
            /* Prevent horizontal scroll on mobile */
        }

        .navbar {
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.7);
            border-bottom: 1px solid var(--border);
            padding: 1.2rem 0;
        }

        .navbar-brand {
            font-weight: 800;
            letter-spacing: -0.5px;
            font-size: 1.25rem;
        }

        .btn-github {
            background: var(--primary);
            color: white !important;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.85rem;
            padding: 8px 18px;
            transition: all 0.3s ease;
        }

        .btn-nav-outline {
            background: transparent;
            color: var(--primary) !important;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.85rem;
            padding: 8px 18px;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        /* Mobile Adjustments for Buttons */
        @media (max-width: 991px) {
            .navbar-collapse {
                margin-top: 15px;
                padding-bottom: 10px;
            }

            .btn-nav-outline,
            .btn-github {
                display: block;
                width: 100%;
                margin: 5px 0;
                text-align: center;
            }
        }

        .main-container {
            flex: 1;
            max-width: 750px;
            margin-top: 20px;
            padding-bottom: 28px;
        }

        .section-title {
            font-weight: 800;
            font-size: 3.2rem;
            letter-spacing: -2px;
            margin-bottom: 1rem;
        }

        .input-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 32px;
            padding: 3rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.03);
        }

        .limit-badge {
            display: inline-flex;
            align-items: center;
            padding: 6px 16px;
            background: #fff1f2;
            color: #e11d48;
            border-radius: 100px;
            font-size: 0.75rem;
            font-weight: 700;
            margin-bottom: 2rem;
            border: 1px solid #ffe4e6;
        }

        .form-control {
            border-radius: 14px;
            padding: 14px 18px;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.5);
        }

        .btn-process {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: white;
            border: none;
            border-radius: 16px;
            padding: 18px;
            font-weight: 700;
            width: 100%;
            margin-top: 1rem;
        }

        #loadingOverlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            z-index: 2000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .footer {
            padding: 40px 0;
            border-top: 1px solid var(--border);
            background: #fff;
        }

        .footer a {
            color: var(--primary);
            font-weight: 700;
            text-decoration: none;
        }
    </style>
</head>

<body>

    <div id="loadingOverlay">
        <i class="fa-solid fa-cloud-arrow-down loader-icon mb-4"></i>
        <h3 class="fw-800">Processing Batch</h3>
        <p class="text-muted">Spinning up browser engines...</p>
    </div>

    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="/">
                <i class="fa-solid fa-graduation-cap me-2 text-accent"></i>
                BEU RESULT
            </a>

            <button class="navbar-toggler border-0 shadow-none" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <div class="ms-auto d-lg-flex align-items-center">
                    <a href="mailto:gooooluraja@gmail.com" class="btn-nav-outline me-lg-2">
                        <i class="fa-solid fa-envelope me-2"></i>Contact
                    </a>
                    <a href="https://hub.docker.com/r/gooolu/beu-result-engine" target="_blank"
                        class="btn-nav-outline me-lg-2">
                        <i class="fa-brands fa-docker me-2"></i>Docker Hub
                    </a>
                    <a href="https://github.com/gooolu-git" target="_blank" class="btn btn-github">
                        <i class="fa-brands fa-github me-2"></i>GitHub
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <div class="container main-container text-center">
        <h1 class="section-title">Batch Downloader</h1>
        <p class="text-muted mb-5 h5 fw-500">The fastest way to export university results.</p>

        <div class="input-card text-start">
            <div class="text-center">
                <span class="limit-badge">
                    <i class="fa-solid fa-bolt-lightning me-2"></i> 60 REGISTRATIONS MAX
                </span>
            </div>

            <form id="downloadForm" method="POST">
                <div class="mb-4">
                    <label class="form-label fw-bold small text-uppercase mb-2 d-block">Sample Result URL</label>
                    <input type="url" name="url" class="form-control"
                        placeholder="Paste the final download link from BEU portal" required>
                </div>

                <div class="row mb-4">
                    <div class="col-md-6 mb-3 mb-md-0">
                        <label class="form-label fw-bold small text-uppercase mb-2 d-block">Start Reg No</label>
                        <input type="number" name="start_reg" class="form-control" placeholder="24162153001" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold small text-uppercase mb-2 d-block">End No</label>
                        <input type="number" name="end_reg" class="form-control" placeholder="24162153012" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-process shadow">
                    <i class="fa-solid fa-file-pdf me-2"></i> Generate Combined PDF
                </button>
            </form>
        </div>
    </div>

    <footer class="footer text-center">
        <div class="container">
            <p class="mb-1">Crafted by <a href="https://github.com/gooolu-git" target="_blank">Golu</a></p>
            <p class="text-muted small">&copy; 2026 BEU Result Engine. Fast. Simple. Secure.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const form = document.getElementById('downloadForm');
        const overlay = document.getElementById('loadingOverlay');
        form.onsubmit = () => { overlay.style.display = 'flex'; };
        window.onpageshow = (e) => { if (e.persisted) overlay.style.display = 'none'; };
    </script>
</body>

</html>
