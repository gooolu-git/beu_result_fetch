<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Process Complete | BEU Engine</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #ffffff; 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            text-align: center; 
        }
        .success-card { 
            max-width: 500px; 
            padding: 50px; 
            border: 1px solid #f1f5f9; 
            border-radius: 32px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.05); 
        }
        .btn-download { 
            background: #000; 
            color: #fff !important; 
            padding: 18px 35px; 
            border-radius: 16px; 
            font-weight: 700; 
            text-decoration: none; 
            display: inline-block; 
            margin-top: 25px; 
            transition: all 0.3s ease;
        }
        .btn-download:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .icon-check { font-size: 60px; color: #10b981; margin-bottom: 25px; }
        .github-link { 
            color: #64748b; 
            text-decoration: none; 
            font-weight: 600; 
            font-size: 0.9rem;
            transition: color 0.2s;
        }
        .github-link:hover { color: #000; }
    </style>
</head>
<body>
    <div class="success-card">
        <div class="icon-check">✓</div>
        <h1 class="fw-800">Ready for Download</h1>
        <p class="text-muted">Thank you for using the <b>BEU Result Engine</b>. Your batch has been processed and is ready to save.</p>
        
        <a href="{{ url_for('download_file', filename=file_name) }}" class="btn-download shadow">Download Combined PDF</a>
        
        <div class="mt-5">
            <p class="small text-secondary mb-2">Check my work on</p>
            <a href="https://github.com/gooolu-git" target="_blank" class="github-link">@gooolu-git</a>
        </div>
        <div class="mt-4">
            <a href="/" class="text-decoration-none small text-secondary">← Process another batch</a>
        </div>
    </div>

    <script>
        // Start download automatically after a small delay
        window.onload = function() {
            setTimeout(() => {
                window.location.href = "{{ url_for('download_file', filename=file_name) }}";
            }, 800);
        };
    </script>
</body>
</html>
